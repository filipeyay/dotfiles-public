# baseado no tema Sonokai. Link -> https://github.com/sainnhe/sonokai

[colors.primary]
    background = "0x2c2e34"
    foreground = "0xe2e2e3"

  [colors.normal]
    black = "0x181819"
    red = "0xfc5d7c"
    green = "0x9ed072"
    yellow = "0xe7c664"
    blue = "0x76cce0"
    magenta = "0xb39df3"
    cyan = "0xf39660"
    white = "0xe2e2e3"

  [colors.bright]
    black = "0x7f8490"
    red = "0xfc5d7c"
    green = "0x9ed072"
    yellow = "0xe7c664"
    blue = "0x76cce0"
    magenta = "0xb39df3"
    cyan = "0xf39660"
    white = "0xe2e2e3"

[window]
startup_mode = "Windowed"
dynamic_title = true
decorations_theme_variant = "Dark"

[font]
normal = { family = "FiraCode Nerd Font", style = "Regular" }
bold = { family = "FiraCode Nerd Font", style = "Regular" }
italic = { family = "FiraCode Nerd Font", style = "Regular" }
bold_italic = { family = "FiraCode Nerd Font", style = "Regular" }
size = 14

[cursor]
style = { shape = "Block", blinking = "Always" }

[mouse]
hide_when_typing = true
