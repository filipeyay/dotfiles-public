[colors.primary]
background = '#00141A'
foreground = '#ADB8B8'

[colors.normal]
black   = '#073642'
red     = '#dc322f'
green   = '#859901'
yellow  = '#b58900'
blue    = '#268bd2'
magenta = '#d33682'
cyan    = '#2aa198'
white   = '#eee8d5'

# Bright colors
[colors.bright]
black   = '#002b36'
red     = '#cb4b16'
green   = '#586e75'
yellow  = '#657b83'
blue    = '#839496'
magenta = '#6c71c4'
cyan    = '#93a1a1'
white   = '#fdf6e3'

[window]
startup_mode = "Windowed"
dynamic_title = true
decorations_theme_variant = "Dark"
decorations = "None"
dimensions = { columns = 80, lines = 26 }

[font]
normal = { family = "Iosevka Nerd Font", style = "Regular" }
bold = { family = "Iosevka Nerd Font", style = "Bold" }
italic = { family = "Iosevka Nerd Font", style = "Italic" }
bold_italic = { family = "Iosevka Nerd Font", style = "Bold Italic" }
size = 16

[cursor]
style = { shape = "Block", blinking = "Always" }

[mouse]
hide_when_typing = true

[env]
  TERM = "xterm-256color"
